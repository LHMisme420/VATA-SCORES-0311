# Disabled - static site only
name: Verify Manifest Lock

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify manifest hash
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File tools/verify_manifest.ps1

